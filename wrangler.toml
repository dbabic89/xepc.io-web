name = "xepcio-web"
compatibility_date = "2026-07-01"

# Only dist/ is uploaded — build.sh assembles it, so .git and repo-only files
# are never part of the deployment.
[assets]
directory = "./dist"
not_found_handling = "404-page"
# Canonical URLs and the sitemap have no trailing slash; serve them directly
# instead of 307-redirecting, so crawlers never take a redirect hop.
html_handling = "drop-trailing-slash"

# Static assets only — there is no Worker code to debug, so logs/traces are off.
[observability]
enabled = false

[observability.logs]
enabled = false
